[project]
name = "cafanasyev-sapient-pydantic"
version = "0.1.0"
description = "SAPIENT (BSI Flex 335 v2.0) pydantic models with ICD validation and converters to/from the google-protobuf classes"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.10"
authors = [{ name = "Konstantin Afanasyev" }]
keywords = ["sapient", "protobuf", "pydantic", "bsi-flex-335", "dstl"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
dependencies = ["pydantic>=2", "python-ulid>=2", "cafanasyev-sapient-proto>=0.1.0"]

[project.urls]
Homepage = "https://github.com/cafanasyev/py-sapient-proto"
Source = "https://github.com/cafanasyev/py-sapient-proto"
Issues = "https://github.com/cafanasyev/py-sapient-proto/issues"

[tool.uv.sources]
cafanasyev-sapient-proto = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sapient_msg_pydantic"]
