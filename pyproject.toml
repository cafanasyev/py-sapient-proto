[tool.uv.workspace]
members = ["packages/*"]

[dependency-groups]
dev = [
    "grpcio-tools>=1.73",
    "mypy>=1.16",
    "pytest>=8",
    "pytest-xdist>=3",
    "ruff>=0.5",
    "types-protobuf>=6",
]

[tool.pytest.ini_options]
addopts = "-n auto"
testpaths = [
    "packages/cafanasyev-sapient-proto/tests",
    "packages/cafanasyev-sapient-pydantic/tests",
]

[tool.mypy]
strict = true
files = [
    "packages/cafanasyev-sapient-pydantic/src",
    "packages/cafanasyev-sapient-pydantic/tests",
    "packages/cafanasyev-sapient-proto/tests",
]

[tool.ruff]
target-version = "py310"
extend-exclude = ["packages/cafanasyev-sapient-proto/src", "external"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B"]
